
    <!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | M.CAFE</title>

<link rel="stylesheet" href="signup.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
</a>

<div class="signup-container">

    <!-- Left Side -->

    <div class="signup-image">

        <img src="https://plus.unsplash.com/premium_photo-1675435644687-562e8042b9db?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y29mZmVlJTIwYWVzdGhldGljfGVufDB8fDB8fHww" alt="Coffee">

        <div class="overlay">
            <h1>M.CAFE</h1>
            <p>Join Our Coffee Family</p>
        </div>

    </div>

    <!-- Right Side -->

    <div class="signup-form">

        <h2>Create Account</h2>

        <p>Sign up and enjoy premium coffee experiences.</p>

        <form>

            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <i class="fa fa-phone"></i>
                <input type="tel" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <i class="fa fa-calendar"></i>
                <input type="date" required>
            </div>

            <div class="gender">

                <label>
                    <input type="radio" name="gender"> Male
                </label>

                <label>
                    <input type="radio" name="gender"> Female
                </label>

                <label>
                    <input type="radio" name="gender"> Other
                </label>

            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <div class="terms">

                <input type="checkbox" required>

                <span>I agree to the Terms & Conditions</span>

            </div>

            <button>Create Account</button>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
</body>
</html>
